<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Du Liban — Operations</title>
<style>
  :root{
    --bg: #14110d; --bg-panel: #1c1812; --bg-card: #221c15;
    --line: #382f22; --line-soft: #2a2419;
    --gold: #c9973f; --gold-soft: #e8c988; --gold-dim: #7a5f2c;
    --text: #f0e9db; --text-dim: #b3a894; --text-faint: #7d7362;
    --free: #3a3226; --seated: #3a6e63; --reserved: #b3812f;
    --danger: #b1503f; --radius: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  *{ box-sizing: border-box; }
  body{ margin:0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .wrap{ max-width: 1180px; margin: 0 auto; padding: 0 16px 60px; }

  header.top{ padding: 22px 16px 14px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
  .brand{ display:flex; align-items:baseline; gap:10px; max-width:1180px; margin:0 auto; }
  .brand .mark{ font-family: Georgia, serif; font-style: italic; color: var(--gold-soft); font-size: 26px; }
  .brand .name{ font-family: Georgia, serif; font-size: 20px; color: var(--text); }
  .langToggle{ margin-left:auto; display:flex; gap:4px; background: var(--bg-card); border:1px solid var(--line); border-radius:6px; padding:2px; }
  .langToggle button{ background:none; border:none; color: var(--text-faint); font-size:12px; font-weight:600; padding:5px 10px; border-radius:4px; cursor:pointer; }
  .langToggle button.active{ background: var(--gold-dim); color: var(--gold-soft); }

  nav.tabs{ display:flex; gap: 4px; max-width: 1180px; margin: 14px auto 0; overflow-x:auto; }
  nav.tabs button{ background:none; border:none; color: var(--text-dim); font-size: 13px; padding: 10px 14px; cursor:pointer; border-bottom: 2px solid transparent; white-space:nowrap; font-weight:500; }
  nav.tabs button.active{ color: var(--gold-soft); border-bottom-color: var(--gold); }
  nav.tabs button:hover{ color: var(--text); }

  .view{ display:none; }
  .view.active{ display:block; }

  .room-tabs{ display:flex; gap:6px; margin-bottom: 16px; flex-wrap: wrap; align-items:center; }
  .room-tabs button{ background: var(--bg-card); border: 1px solid var(--line); color: var(--text-dim); padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .room-tabs button.active{ background: var(--gold-dim); color: var(--gold-soft); border-color: var(--gold-dim); }
  .room-tabs .spacer{ flex:1; }

  .floor{ background: #0c0a08; border-radius: var(--radius); border: 1px solid var(--line); padding: 24px; position: relative; min-height: 460px; display: grid; gap: 8px; }
  .table-btn{ border: 2px solid var(--line); background: var(--free); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; display:flex; align-items:center; justify-content:center; flex-direction:column; min-height: 48px; width:100%; height:100%; padding: 2px; }
  .table-btn.round{ border-radius: 50%; }
  .table-btn.diamond{ transform: rotate(45deg); }
  .table-btn.diamond span{ transform: rotate(-45deg); display:block; }
  .table-btn.seated{ background: var(--seated); border-color:#4a8f7f; }
  .table-btn.reserved{ background: var(--reserved); border-color:#d49a3e; }
  .table-btn .guest{ font-size: 9px; font-weight:400; margin-top:1px; max-width:56px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fixture{ background: #050403; border: 1px solid var(--line-soft); color: var(--text-faint); display:flex; align-items:center; justify-content:center; font-size: 10px; letter-spacing: 1px; text-align:center; padding: 4px; }
  .legend{ display:flex; gap:18px; margin-top:16px; font-size:12px; color:var(--text-dim); flex-wrap:wrap; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }

  .toolbar{ display:flex; gap:10px; margin-bottom: 16px; flex-wrap:wrap; align-items:center; }
  .btn{ background: var(--gold-dim); color: var(--gold-soft); border:none; padding:10px 18px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn.secondary{ background: var(--bg-card); border:1px solid var(--line); color: var(--text-dim); }
  .btn.danger{ background:#3a1f1a; color:#e0938a; }
  .btn.small{ padding:6px 12px; font-size:12px; }
  input, select, textarea{ background: var(--bg-card); border:1px solid var(--line); color: var(--text); padding:9px 12px; border-radius:6px; font-size:13px; font-family:inherit; }
  input:focus, select:focus, textarea:focus{ outline:1px solid var(--gold-dim); }

  .card{ background: var(--bg-card); border:1px solid var(--line); border-radius: var(--radius); padding:16px; margin-bottom:10px; }
  .row-flex{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .item-name{ font-weight:600; font-size:15px; }
  .item-meta{ font-size:12px; color: var(--text-faint); margin-top:3px; }
  .item-list{ font-size:13px; color: var(--text-dim); margin-top:8px; line-height:1.5; }
  .badge{ font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .badge.new{ background:#3a2f1a; color: var(--gold-soft); }
  .badge.preparing{ background:#1a2e3a; color:#85bfe0; }
  .badge.ready{ background:#1a3a2a; color:#7fdba0; }
  .badge.done{ background:#262620; color: var(--text-faint); }
  .badge.flag{ background:#3a1f1a; color:#e0938a; }
  .badge.channel-voice{ background:#1a2e3a; color:#85bfe0; }
  .badge.channel-manual{ background:#262620; color: var(--text-dim); }
  .row-actions{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .row-actions button{ font-size:12px; padding:6px 12px; }
  .empty{ text-align:center; padding:50px 20px; color: var(--text-faint); font-size:14px; }

  /* ---- Section headers (date groups) ---- */
  .section-header{
    display:flex; justify-content:space-between; align-items:baseline;
    margin: 22px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }
  .section-header:first-child{ margin-top: 4px; }
  .section-title{ font-family: Georgia, serif; font-size: 17px; color: var(--gold-soft); letter-spacing: 0.3px; }
  .section-count{ font-size: 12px; color: var(--text-faint); }
  .section-divider{
    margin: 30px 0 6px; padding-top: 18px; border-top: 2px dashed var(--line);
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-faint);
  }

  /* ---- Card polish ---- */
  .card{ transition: border-color 0.15s, transform 0.1s; }
  .card:hover{ border-color: var(--gold-dim); }
  header.top{ background: linear-gradient(180deg, rgba(201,151,63,0.05), transparent); }
  .btn{ transition: filter 0.12s, transform 0.08s; }
  .btn:hover{ filter: brightness(1.12); }
  .btn:active{ transform: scale(0.97); }
  .table-btn{ transition: background 0.15s, transform 0.08s, box-shadow 0.15s; }
  .table-btn:hover{ box-shadow: 0 0 0 2px var(--gold-dim); }
  nav.tabs button{ transition: color 0.15s; position: relative; }
  .stat{ transition: border-color 0.15s; }
  .stat:hover{ border-color: var(--gold-dim); }

  /* ---- Reservations: calendar + table layout ---- */
  .res-layout{ display:flex; gap:24px; align-items:flex-start; }
  .res-calendar-panel{ width:260px; flex-shrink:0; background: var(--bg-card); border:1px solid var(--line); border-radius: var(--radius); padding:16px; }
  .cal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-weight:600; font-size:14px; color:var(--gold-soft); }
  .cal-nav{ background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:2px 8px; }
  .cal-nav:hover{ color:var(--gold-soft); }
  .cal-weekdays{ display:grid; grid-template-columns: repeat(7,1fr); font-size:10px; color:var(--text-faint); text-align:center; margin-bottom:4px; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:2px; }
  .cal-day{ aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12px; color:var(--text-dim); cursor:pointer; border-radius:6px; position:relative; }
  .cal-day:hover{ background: var(--bg-panel); }
  .cal-day.other-month{ color: var(--text-faint); opacity:0.4; }
  .cal-day.selected{ background: var(--gold); color:#1a1510; font-weight:700; }
  .cal-day.today-marker{ box-shadow: inset 0 0 0 1px var(--gold-dim); }
  .cal-day .dot{ width:4px; height:4px; border-radius:50%; background: var(--gold-soft); margin-top:2px; }
  .cal-day.selected .dot{ background:#1a1510; }

  .res-main{ flex:1; min-width:0; }
  .res-toolbar-top{ display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .date-display{ font-family: Georgia, serif; font-size:18px; color:var(--text); display:flex; align-items:center; gap:8px; }
  .date-display .cal-icon{ width:18px; height:18px; color: var(--gold-soft); flex-shrink:0; }
  .relative-day-badge{ background: var(--gold-dim); color: var(--gold-soft); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:4px 10px; border-radius:20px; margin-right:auto; }
  .res-search-input{ width:100%; margin-bottom:14px; }

  .res-table-wrap{ border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; margin-bottom:18px; }
  table.res-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.res-table thead th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-faint); padding:10px 12px; background:#0c0a08; border-bottom:1px solid var(--line); }
  table.res-table tbody td{ padding:10px 12px; border-bottom:1px solid var(--line-soft); color:var(--text-dim); }
  table.res-table tbody tr:last-child td{ border-bottom:none; }
  table.res-table tbody tr:hover{ background: rgba(201,151,63,0.05); }
  table.res-table .rt-name{ color:var(--text); font-weight:600; }
  table.res-table .rt-group-row td{ background:#0c0a08; color:var(--text-faint); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding:8px 12px; }
  table.res-table .rt-actions{ display:flex; gap:6px; opacity:0; transition:opacity 0.12s; }
  table.res-table tbody tr:hover .rt-actions{ opacity:1; }
  table.res-table .rt-actions button{ font-size:11px; padding:4px 9px; }
  table.res-table .rt-notes{ max-width:220px; font-size:12px; color:var(--text-faint); }


  .price{ color: var(--gold-soft); font-weight:600; }

  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; overflow-y:auto; }
  .modal{ background: var(--bg-panel); border:1px solid var(--line); border-radius: var(--radius); padding:24px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; }
  .modal h3{ margin:0 0 16px; font-size:17px; font-weight:600; color: var(--gold-soft); }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color: var(--text-dim); margin-bottom:5px; }
  .field input, .field select, .field textarea{ width:100%; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .modal-actions button{ flex:1; }

  .stats{ display:grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap:10px; margin-bottom:18px; }
  .stat{ background: var(--bg-card); border:1px solid var(--line); border-radius: var(--radius); padding:14px; }
  .stat .n{ font-size:24px; font-weight:700; color: var(--gold-soft); }
  .stat .l{ font-size:11px; color: var(--text-faint); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

  .msg-box{ background:#0c0a08; border:1px solid var(--line); border-radius:8px; padding:12px; font-size:13px; color: var(--text-dim); white-space:pre-wrap; margin-top:10px; line-height:1.6; }
  .hint{ font-size:12px; color: var(--text-faint); margin-bottom: 12px; }
  .edit-note{ background:#241d10; border:1px solid var(--gold-dim); color: var(--gold-soft); border-radius:8px; padding:10px 14px; font-size:12px; margin-bottom:14px; }

  .item-picker-row{ display:flex; gap:6px; margin-bottom:8px; }
  .item-picker-row input[list]{ flex:1; }
  .item-picker-row input[type=number]{ width:60px; }
  .order-lines{ background:#0c0a08; border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:10px; }
  .order-line{ display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .order-line button{ background:none; border:none; color: var(--danger); cursor:pointer; font-size:12px; }
  .order-total{ display:flex; justify-content:space-between; font-weight:700; font-size:14px; border-top:1px solid var(--line); padding-top:8px; margin-top:6px; color: var(--gold-soft); }

  @media (max-width: 640px){
    .table-btn{ font-size: 11px; }
    .brand .sub{ display:none; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="mark">du</span><span class="name" id="brandTitle">Liban — Operations</span>
    <div class="langToggle">
      <button id="lang-es" onclick="setLang('es')">ES</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button data-view="floor" class="active"></button>
    <button data-view="orders"></button>
    <button data-view="reservations"></button>
    <button data-view="customers"></button>
    <button data-view="marketing"></button>
  </nav>
</header>

<div class="wrap">

  <section id="view-floor" class="view active">
    <div class="room-tabs" id="roomTabs">
      <button data-room="room1" class="active">Sala 1</button>
      <button data-room="room2">Sala 2</button>
      <button data-room="room3">Sala 3</button>
      <button data-room="vip">VIP</button>
      <div class="spacer"></div>
      <button class="btn small secondary" id="editModeBtn" onclick="toggleEditMode()"></button>
    </div>
    <div id="editNote" class="edit-note" style="display:none"></div>
    <div class="floor" id="floorArea"></div>
    <div class="legend" id="legend"></div>
    <div class="toolbar" id="editToolbar" style="display:none; margin-top:14px">
      <button class="btn small" id="addTableBtn" onclick="addTable()"></button>
    </div>
  </section>

  <section id="view-orders" class="view">
    <div class="res-layout">
      <div class="res-calendar-panel">
        <div class="cal-header">
          <button class="cal-nav" onclick="calShiftMonth(-1,'order')">‹</button>
          <span id="ordCalMonthLabel"></span>
          <button class="cal-nav" onclick="calShiftMonth(1,'order')">›</button>
        </div>
        <div class="cal-weekdays" id="ordCalWeekdays"></div>
        <div class="cal-grid" id="ordCalGrid"></div>
      </div>
      <div class="res-main">
        <div class="stats" id="orderStats"></div>
        <div class="res-toolbar-top">
          <div class="date-display" id="ordDateDisplay"></div>
          <span class="relative-day-badge" id="ordRelativeDayBadge" style="display:none"></span>
          <button class="btn secondary" onclick="goToToday('order')" id="ordNowBtn"></button>
          <button class="btn" id="newOrderBtn" onclick="openOrderModal()"></button>
          <select id="orderFilter" onchange="renderOrders()"></select>
          <button class="btn secondary syncBtn" onclick="syncWithLive()" id="syncBtn1"></button>
        </div>
        <input type="text" id="orderSearch" class="res-search-input" oninput="renderOrders()">
        <div id="ordersList"></div>
      </div>
    </div>
  </section>

  <section id="view-reservations" class="view">
    <div class="res-layout">
      <div class="res-calendar-panel">
        <div class="cal-header">
          <button class="cal-nav" onclick="calShiftMonth(-1)">‹</button>
          <span id="calMonthLabel"></span>
          <button class="cal-nav" onclick="calShiftMonth(1)">›</button>
        </div>
        <div class="cal-weekdays" id="calWeekdays"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="res-main">
        <div class="res-toolbar-top">
          <div class="date-display" id="resDateDisplay"></div>
          <span class="relative-day-badge" id="relativeDayBadge" style="display:none"></span>
          <button class="btn secondary" onclick="goToToday()" id="nowBtn"></button>
          <button class="btn" id="newResBtn" onclick="openReservationModal()"></button>
          <button class="btn secondary syncBtn" onclick="syncWithLive()" id="syncBtn2"></button>
        </div>
        <input type="text" id="resSearch" class="res-search-input" oninput="renderReservations()">
        <div id="reservationsList"></div>
      </div>
    </div>
  </section>

  <section id="view-customers" class="view">
    <div class="stats" id="customerStats"></div>
    <div class="toolbar">
      <button class="btn" id="newCustBtn" onclick="openCustomerModal()"></button>
      <input type="text" id="customerSearch" oninput="renderCustomers()" style="flex:1; min-width:180px;">
      <select id="customerFilter" onchange="renderCustomers()"></select>
    </div>
    <div id="customersList"></div>
  </section>

  <section id="view-marketing" class="view">
    <div class="hint" id="marketingHint"></div>
    <div class="toolbar">
      <button class="btn" id="genCampaignBtn" onclick="renderCampaign()"></button>
      <select id="campaignTemplate" onchange="renderCampaign()"></select>
    </div>
    <div id="campaignOutput"></div>
    <div id="marketingList" style="margin-top:20px"></div>
  </section>

</div>

<div id="modalRoot"></div>

/* ============ LIVE RAILWAY SYNC ============ */
const RAILWAY_URL = 'https://web-production-578f0.up.railway.app';

function parseSheetTimestamp(ts){
  if(!ts) return new Date().toISOString();
  const iso = ts.replace(' ', 'T') + ':00';
  const d = new Date(iso);
  return isNaN(d.getTime()) ? new Date().toISOString() : d.toISOString();
}
function mapOrderStatus(s){
  const m = { 'PENDING':'new', 'PREPARING':'preparing', 'READY':'ready', 'DONE':'done', 'COMPLETED':'done' };
  return m[String(s||'').toUpperCase()] || 'new';
}

async function syncWithLive(){
  const btns = document.querySelectorAll('.syncBtn');
  btns.forEach(b=> b.textContent = t('syncing'));
  try{
    const [ordersRes, resRes, tablesRes, custRes] = await Promise.all([
      fetch(RAILWAY_URL + '/get-orders').then(r=>r.json()).catch(()=>({orders:[]})),
      fetch(RAILWAY_URL + '/get-reservations').then(r=>r.json()).catch(()=>({reservations:[]})),
      fetch(RAILWAY_URL + '/get-tables').then(r=>r.json()).catch(()=>({tables:[]})),
      fetch(RAILWAY_URL + '/get-customers').then(r=>r.json()).catch(()=>({customers:[]}))
    ]);

    const liveOrders = (ordersRes.orders || []).map((r, idx) => ({
      id: 'live_ord_' + idx,
      name: r.Name || r.name || '',
      phone: r.Phone || r.phone || '',
      date: r.PickupDate || r.pickup_date || '',
      time: r.PickupTime || r.pickup_time || '',
      items: r.Items || r.items || '',
      notes: r.Notes || '',
      channel: r.Channel || 'Voice',
      total: parseFloat(r.Total || r.total || 0) || 0,
      status: mapOrderStatus(r.Status),
      createdAt: parseSheetTimestamp(r.Timestamp),
      live: true
    }));
    orders = [...liveOrders, ...orders.filter(o=>!o.live)];

    const liveRes = (resRes.reservations || []).map((r, idx) => ({
      id: 'live_res_' + idx,
      name: r.Name || r.name || '',
      phone: r.Phone || r.phone || '',
      date: r.Date || r.date || '',
      time: r.Time || r.time || '',
      guests: r.Guests || r.guests || '',
      table: '',
      notes: r.Notes || '',
      channel: (r.Channel || 'Voice'),
      status: r.Status || 'confirmed',
      live: true
    }));
    reservations = [...liveRes, ...reservations.filter(r=>!r.live)];

    (tablesRes.tables || []).forEach(r => {
      const tid = String(r.TableID || '');
      if(!tid) return;
      tableStatus[tid] = r.Status || 'free';
      if(r.GuestName) tableStatus[tid+'_name'] = r.GuestName;
    });

    const liveCustomers = (custRes.customers || []).map((r, idx) => ({
      id: 'live_cust_' + idx,
      name: r.Name || '',
      phone: r.Phone || '',
      email: r.Email || '',
      notes: r.Notes || '',
      visits: parseInt(r.Visits || 1) || 1,
      lastVisit: r.LastVisit ? parseSheetTimestamp(r.LastVisit) : new Date().toISOString(),
      live: true
    }));
    customers = [...liveCustomers, ...customers.filter(c=>!c.live)];

    renderOrderCalendar();
    renderOrders();
    renderCalendar();
    renderReservations();
    renderFloor();
    renderCustomers();
  } catch(e){
    console.error('sync error', e);
    alert(t('syncError'));
  }
  btns.forEach(b=> b.textContent = t('sync'));
}

function renderFloor(){
  document.querySelectorAll('#roomTabs button[data-room]').forEach(b=> b.classList.toggle('active', b.dataset.room===currentRoom));
  const area = document.getElementById('floorArea');
  const room = tableLayout[currentRoom];
  area.style.gridTemplateColumns = `repeat(${room.cols}, 1fr)`;
  area.style.gridTemplateRows = `repeat(${room.rows}, 64px)`;
  let html = '';
  room.fixtures.forEach(f=> html += `<div class="fixture" style="grid-column:${f.col}; grid-row:${f.row}">${f.label}</div>`);
  room.tables.forEach(tb=>{
    const status = tableStatus[tb.id] || 'free';
    const shapeClass = tb.shape==='round'?'round':(tb.shape==='diamond'?'diamond':'');
    const guestName = tableStatus[tb.id+'_name'] || '';
    const clickFn = editMode ? `editTable('${tb.id}')` : `toggleTable('${tb.id}')`;
    html += `<button class="table-btn ${shapeClass} ${status}" style="grid-column:${tb.col}; grid-row:${tb.row}" onclick="${clickFn}"><span>${tb.id}${guestName?`<div class="guest">${guestName}</div>`:''}</span></button>`;
  });
  area.innerHTML = html;
}
async function toggleTable(id){
  const cur = tableStatus[id] || 'free';
  let newStatus, guestName = '';
  if(cur==='free'){
    const name = prompt(t('guestPrompt'));
    newStatus = 'seated';
    tableStatus[id] = 'seated';
    if(name){ tableStatus[id+'_name'] = name; guestName = name; }
  } else {
    newStatus = cycleStatus(cur);
    tableStatus[id] = newStatus;
    if(newStatus==='free') delete tableStatus[id+'_name'];
    else guestName = tableStatus[id+'_name'] || '';
  }
  await saveKey('duliban-table-status', tableStatus);
  renderFloor();
  try{
    await fetch(RAILWAY_URL + '/update-table', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ table_id: id, room: currentRoom, status: newStatus, guest_name: guestName })
    });
  } catch(e){ console.error('table sync error', e); }
}

async function editTable(id){

  const room = tableLayout[currentRoom];

    room.tables = room.tables.filter(x=>x.id!==id);
  } else if(action.trim() && action.trim()!==id){
    const tb = room.tables.find(x=>x.id===id);
    if(tb) tb.id = action.trim();
  }
  await saveKey('duliban-table-layout', tableLayout);
  renderFloor();
}
async function addTable(){
  const id = prompt(t('newTablePrompt'));
  if(!id) return;
  const room = tableLayout[currentRoom];
  const shape = prompt(t('shapePrompt'), 'cuadrada') || 'cuadrada';
  const shapeMap = {'cuadrada':'sq','square':'sq','redonda':'round','round':'round','diamante':'diamond','diamond':'diamond'};
  const nextCol = (room.tables.length % room.cols) + 1;
  const nextRow = Math.floor(room.tables.length / room.cols) + 1;
  room.tables.push({ id:id.trim(), shape: shapeMap[shape.toLowerCase()]||'sq', col:String(nextCol), row:String(nextRow) });

  renderFloor();
}

  renderOrderLines();
}

async function saveOrder(){
  const id = document.getElementById('o_id').value;
  const name = document.getElementById('o_name').value.trim();
  const phone = document.getElementById('o_phone').value.trim();
  const date = document.getElementById('o_date').value;
  const time = document.getElementById('o_time').value;
  const notes = document.getElementById('o_notes').value.trim();
  const channel = document.getElementById('o_channel').value;
  const lines = currentOrderLines.slice();
  const total = lines.reduce((s,l)=> s + l.price*l.qty, 0);
  const itemsText = lines.map(l=>`${l.qty}x ${l.name}`).join(', ');
  if(!name || lines.length===0){ alert(t('requiredOrder')); return; }
  if(id){
    const o = orders.find(x=>x.id===id);
    Object.assign(o, {name, phone, date, time, notes, channel, lines, total, items: itemsText});
    await saveKey('duliban-orders', orders);
  } else {
    orders.unshift({ id:'ord_'+Date.now(), name, phone, date, time, notes, channel, lines, total, items: itemsText, status:'new', createdAt: new Date().toISOString() });
    await saveKey('duliban-orders', orders);
    try{
      await fetch(RAILWAY_URL + '/save-dashboard-order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, phone, date, time, notes, channel, lines })
      });
      syncWithLive();
    } catch(e){ console.error('order save error', e); }
  }
  closeModal();
  renderOrderCalendar();
  renderOrders();
}
async function touchCustomer(name, phone){
  let c = customers.find(c => phone && c.phone === phone);
  if(!c){ c = { id:'cust_'+Date.now(), name, phone, visits:1, lastVisit: new Date().toISOString(), notes:'' }; customers.unshift(c); }
  else { c.visits = (c.visits||0)+1; c.lastVisit = new Date().toISOString(); }
  await saveKey('duliban-customers', customers);
}
const statusOrderList = ['new','preparing','ready','done'];
async function advanceOrder(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = statusOrderList[(statusOrderList.indexOf(o.status)+1) % statusOrderList.length];
  await saveKey('duliban-orders', orders);
  renderOrders();
}
async function deleteOrder(id){
  if(!confirm(t('confirmDelOrder'))) return;
  orders = orders.filter(x=>x.id!==id);
  await saveKey('duliban-orders', orders);
  renderOrderCalendar();
  renderOrders();
}
function isToday(iso){
  if(!iso) return false;
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}
function renderOrders(){
  const months = currentLang==='es' ? MONTH_ES : MONTH_EN;
  const weekdays = currentLang==='es' ? WEEKDAY_ES : WEEKDAY_EN;
  const wd = weekdays[selectedOrderDate.getDay()];
  const dateLabel = currentLang==='es'
    ? `${wd.charAt(0).toUpperCase()+wd.slice(1)}, ${selectedOrderDate.getDate()} de ${months[selectedOrderDate.getMonth()]}`
    : `${wd}, ${months[selectedOrderDate.getMonth()]} ${selectedOrderDate.getDate()}`;
  document.getElementById('ordDateDisplay').innerHTML = calendarIconSvg() + dateLabel;

  const realToday = new Date(); realToday.setHours(0,0,0,0);
  const diffFromReal = Math.round((selectedOrderDate - realToday) / 86400000);
  const badge = document.getElementById('ordRelativeDayBadge');
  if(diffFromReal === 0){ badge.textContent = t('todayLabel'); badge.style.display = 'inline-block'; }
  else if(diffFromReal === -1){ badge.textContent = t('yesterdayLabel'); badge.style.display = 'inline-block'; }
  else if(diffFromReal === 1){ badge.textContent = t('tomorrowLabel'); badge.style.display = 'inline-block'; }
  else { badge.style.display = 'none'; }

  const filter = document.getElementById('orderFilter').value || 'all';
  const search = (document.getElementById('orderSearch').value || '').toLowerCase();
  const dayKey = dateKey(selectedOrderDate);
  let dayItems = orders.filter(o => {
    const d = parseResDate(o.date);
    return d && dateKey(d) === dayKey;
  });
  if(filter !== 'all') dayItems = dayItems.filter(o => o.status === filter);
  if(search) dayItems = dayItems.filter(o => o.name.toLowerCase().includes(search) || (o.phone||'').includes(search));
  dayItems.sort((a,b)=> (a.time||'').localeCompare(b.time||''));

  const statusLabelMap = { new:t('stNew'), preparing:t('stPrep'), ready:t('stReady'), done:t('stDone') };
  const counts = { new:0, preparing:0, ready:0, done:0 };
  let dayRevenue = 0;
  dayItems.forEach(o=>{ counts[o.status] = (counts[o.status]||0)+1; dayRevenue += (o.total||0); });
  document.getElementById('orderStats').innerHTML = `
    <div class="stat"><div class="n">${counts.new}</div><div class="l">${t('statNew')}</div></div>
    <div class="stat"><div class="n">${counts.preparing}</div><div class="l">${t('statPrep')}</div></div>
    <div class="stat"><div class="n">${counts.ready}</div><div class="l">${t('statReady')}</div></div>
    <div class="stat"><div class="n">${dayItems.length}</div><div class="l">${t('statTotal')}</div></div>
    <div class="stat"><div class="n">€${dayRevenue.toFixed(2)}</div><div class="l">${t('statRevenue')}</div></div>`;

  const list = document.getElementById('ordersList');
  if(dayItems.length===0){ list.innerHTML = `<div class="empty">${t('noOrders')}</div>`; return; }

  list.innerHTML = dayItems.map(o => `
    <div class="card">
      <div class="row-flex">
        <div>
          <div class="item-name">${o.name}</div>
          <div class="item-meta">${o.phone || '—'}${o.time ? ' · '+o.time : ''}</div>
        </div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end">
          <span class="badge channel-${(o.channel||'Manual').toLowerCase()}">${(o.channel||'').toLowerCase()==='voice'?t('voiceCall'):(o.channel||'').toLowerCase()==='whatsapp'?'WhatsApp':t('manual')}${o.live?' · '+t('liveTag'):''}</span>
          <span class="badge ${o.status}">${statusLabelMap[o.status]}</span>
        </div>
      </div>
      <div class="item-list">${o.items||''}</div>
      <div class="item-meta price" style="margin-top:6px">${t('total')}: €${(o.total||0).toFixed(2)}</div>
      ${o.notes ? `<div class="item-meta" style="margin-top:4px">${o.notes}</div>` : ''}
      <div class="row-actions">
        <button class="btn secondary" onclick='openOrderModal(${JSON.stringify(o).replace(/'/g,"&apos;")})'>${t('edit')}</button>
        <button class="btn secondary" onclick="advanceOrder('${o.id}')">${t('advance')}</button>
        <button class="btn danger" onclick="deleteOrder('${o.id}')">${t('delete')}</button>
      </div>
    </div>`).join('');
}

async function saveReservation(){
  const id = document.getElementById('r_id').value;
  const name = document.getElementById('r_name').value.trim();
  const phone = document.getElementById('r_phone').value.trim();
  const date = document.getElementById('r_date').value;
  const time = document.getElementById('r_time').value;
  const guests = document.getElementById('r_guests').value;
  const table = document.getElementById('r_table').value.trim();
  const notes = document.getElementById('r_notes').value.trim();
  const channel = document.getElementById('r_channel').value;
  if(!name || !date || !time){ alert(t('requiredRes')); return; }
  const fullNotes = [table ? ('Mesa '+table) : '', notes].filter(Boolean).join('. ');
  if(id){
    const r = reservations.find(x=>x.id===id);
    Object.assign(r, {name, phone, date, time, guests, table, notes, channel});
    await saveKey('duliban-reservations', reservations);
    if(r.live){
      try{
        await fetch(RAILWAY_URL + '/add-reservation-note', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, phone, notes: fullNotes })
        });
        syncWithLive();
      } catch(e){ console.error('note update error', e); }
    }
  } else {
    reservations.unshift({ id:'res_'+Date.now(), name, phone, date, time, guests, table, notes, channel, status:'confirmed' });
    await saveKey('duliban-reservations', reservations);
    try{
      const parts = date.split('-');
      const ddmmyyyy = parts.length===3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : date;
      await fetch(RAILWAY_URL + '/voice-reservation', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, phone, date: ddmmyyyy, time, guests, notes: fullNotes, channel })
      });
      syncWithLive();
    } catch(e){ console.error('reservation save error', e); }
  }
  closeModal();
  renderCalendar();
  renderReservations();
}
async function deleteReservation(id){
  if(!confirm(t('confirmDelRes'))) return;
  reservations = reservations.filter(r=>r.id!==id);
  await saveKey('duliban-reservations', reservations);
  renderCalendar();
  renderReservations();
}
const WEEKDAY_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const WEEKDAY_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WEEKDAY_SHORT_ES = ['D','L','M','X','J','V','S'];
const WEEKDAY_SHORT_EN = ['S','M','T','W','T','F','S'];
const MONTH_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const MONTH_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function parseResDate(str){
  if(!str) return null;
  let m = String(str).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = String(str).match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  return null;
}
function dateKey(d){ return d.toISOString().slice(0,10); }

let selectedResDate = new Date(); selectedResDate.setHours(0,0,0,0);
let calMonth = selectedResDate.getMonth();
let calYear = selectedResDate.getFullYear();

let selectedOrderDate = new Date(); selectedOrderDate.setHours(0,0,0,0);
let orderCalMonth = selectedOrderDate.getMonth();
let orderCalYear = selectedOrderDate.getFullYear();

function calShiftMonth(delta, which){
  which = which || 'res';
  if(which==='order'){
    orderCalMonth += delta;
    if(orderCalMonth < 0){ orderCalMonth = 11; orderCalYear--; }
    if(orderCalMonth > 11){ orderCalMonth = 0; orderCalYear++; }
    renderOrderCalendar();
  } else {
    calMonth += delta;
    if(calMonth < 0){ calMonth = 11; calYear--; }
    if(calMonth > 11){ calMonth = 0; calYear++; }
    renderCalendar();
  }
}
function goToToday(which){
  which = which || 'res';
  const t = new Date(); t.setHours(0,0,0,0);
  if(which==='order'){
    selectedOrderDate = t; orderCalMonth = t.getMonth(); orderCalYear = t.getFullYear();
    renderOrderCalendar(); renderOrders();
  } else {
    selectedResDate = t; calMonth = t.getMonth(); calYear = t.getFullYear();
    renderCalendar(); renderReservations();
  }
}
function selectCalDay(y, m, d){
  selectedResDate = new Date(y, m, d);
  calMonth = m; calYear = y;
  renderCalendar();
  renderReservations();
}
function selectOrderCalDay(y, m, d){
  selectedOrderDate = new Date(y, m, d);
  orderCalMonth = m; orderCalYear = y;
  renderOrderCalendar();
  renderOrders();
}

function buildCalendarGrid(month, year, selectedDate, datesWithDot, onSelectFnName){
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = [];
  for(let i=startOffset-1; i>=0; i--){
    cells.push({ day: daysInPrevMonth-i, month: month-1, year: year, other:true });
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({ day:d, month:month, year:year, other:false });
  }
  while(cells.length % 7 !== 0){
    const idx = cells.length - (startOffset+daysInMonth);
    cells.push({ day: idx+1, month: month+1, year: year, other:true });
  }

  return cells.map(c => {
    const cellDate = new Date(c.year, c.month, c.day);
    const key = dateKey(cellDate);
    const isSelected = dateKey(selectedDate) === key;
    const isToday = dateKey(today) === key;
    const hasDot = datesWithDot.has(key);
    return `<div class="cal-day ${c.other?'other-month':''} ${isSelected?'selected':''} ${isToday?'today-marker':''}"
      onclick="${onSelectFnName}(${c.year},${c.month},${c.day})">
      <span>${c.day}</span>${hasDot ? '<span class="dot"></span>' : ''}
    </div>`;
  }).join('');
}

function renderCalendar(){
  const months = currentLang==='es' ? MONTH_ES : MONTH_EN;
  const weekdaysShort = currentLang==='es' ? WEEKDAY_SHORT_ES : WEEKDAY_SHORT_EN;
  document.getElementById('calMonthLabel').textContent = `${months[calMonth].charAt(0).toUpperCase()+months[calMonth].slice(1)} ${calYear}`;
  document.getElementById('calWeekdays').innerHTML = weekdaysShort.map(w=>`<div>${w}</div>`).join('');

  const datesWithRes = new Set();
  reservations.forEach(r => { const d = parseResDate(r.date); if(d) datesWithRes.add(dateKey(d)); });

  document.getElementById('calGrid').innerHTML = buildCalendarGrid(calMonth, calYear, selectedResDate, datesWithRes, 'selectCalDay');
}

function renderOrderCalendar(){
  const months = currentLang==='es' ? MONTH_ES : MONTH_EN;
  const weekdaysShort = currentLang==='es' ? WEEKDAY_SHORT_ES : WEEKDAY_SHORT_EN;
  document.getElementById('ordCalMonthLabel').textContent = `${months[orderCalMonth].charAt(0).toUpperCase()+months[orderCalMonth].slice(1)} ${orderCalYear}`;
  document.getElementById('ordCalWeekdays').innerHTML = weekdaysShort.map(w=>`<div>${w}</div>`).join('');

  const datesWithOrd = new Set();
  orders.forEach(o => { const d = parseResDate(o.date); if(d) datesWithOrd.add(dateKey(d)); });

  document.getElementById('ordCalGrid').innerHTML = buildCalendarGrid(orderCalMonth, orderCalYear, selectedOrderDate, datesWithOrd, 'selectOrderCalDay');
}

function draftMessage(id){
  const c = customers.find(x=>x.id===id);
  if(!c) return;
  const msg = templates.reengage(c.name);
  const box = document.getElementById('msg_'+id);
  box.style.display = box.style.display==='none' ? 'block' : 'none';
  box.innerText = msg;
}
function renderCustomers(){
  const search = document.getElementById('customerSearch').value.toLowerCase();
  const filter = document.getElementById('customerFilter').value || 'all';
  const list = document.getElementById('customersList');
  const stats = document.getElementById('customerStats');
  const flagged = customers.filter(c => daysSince(c.lastVisit) >= 30);
  stats.innerHTML = `
    <div class="stat"><div class="n">${customers.length}</div><div class="l">${t('statTotalCust')}</div></div>
    <div class="stat"><div class="n">${flagged.length}</div><div class="l">${t('statFlagged')}</div></div>`;
  let shown = customers;
  if(filter==='flagged') shown = flagged;
  if(search) shown = shown.filter(c => c.name.toLowerCase().includes(search) || (c.phone||'').includes(search));
  if(shown.length===0){ list.innerHTML = `<div class="empty">${t('noCust')}</div>`; return; }
  list.innerHTML = shown.map(c => {
    const d = daysSince(c.lastVisit);
    const isFlagged = d >= 30;
    return `
    <div class="card">
      <div class="row-flex">
        <div>
          <div class="item-name">${c.name}</div>
          <div class="item-meta">${c.phone||'—'}${c.email?' · '+c.email:''} · ${c.visits||1} ${t('visits')} · ${t('lastVisit')} ${d===9999?'—':d+' '+t('days')}</div>
        </div>
        ${isFlagged ? `<span class="badge flag">${t('contact')}</span>` : ''}
      </div>
      ${c.notes ? `<div class="item-list">${c.notes}</div>` : ''}
      <div class="row-actions">
        <button class="btn secondary" onclick='openCustomerModal(${JSON.stringify(c).replace(/'/g,"&apos;")})'>${t('edit')}</button>
        <button class="btn secondary" onclick="draftMessage('${c.id}')">${t('draft')}</button>
        <button class="btn danger" onclick="deleteCustomer('${c.id}')">${t('delete')}</button>
      </div>
      <div class="msg-box" id="msg_${c.id}" style="display:none"></div>
    </div>`;
  }).join('');
}

  reengage: (name) => `Hola ${name}! Somos Du Liban 😊 Hace tiempo que no te vemos y nos encantaría recibirte de nuevo. ¿Te apetece pasarte esta semana? Un saludo del equipo de Du Liban.`,
  birthday: (name) => `¡Feliz cumpleaños, ${name}! 🎉 De parte de todo el equipo de Du Liban, nos encantaría celebrarlo contigo. Ven a visitarnos y te invitamos a un postre.`,
  review: (name) => `Hola ${name}, gracias por tu visita a Du Liban. Nos encantaría conocer tu opinión: ¿nos dejarías una reseña? Significa mucho para nosotros.`
};
function renderCampaign(){
  const tpl = document.getElementById('campaignTemplate').value || 'reengage';
  const flagged = customers.filter(c => daysSince(c.lastVisit) >= 30 && c.phone);
  const out = document.getElementById('campaignOutput');
  if(flagged.length===0){ out.innerHTML = `<div class="empty">${t('noFlagged')}</div>`; return; }
  const combined = flagged.map(c => `— ${c.name} (${c.phone}) —\n${templates[tpl](c.name)}`).join('\n\n');
  out.innerHTML = `<div class="msg-box" style="display:block">${combined}</div><div class="hint" style="margin-top:8px">${t('sendNote')}</div>`;
}
function renderMarketing(){
  const flagged = customers.filter(c => daysSince(c.lastVisit) >= 30);
  const list = document.getElementById('marketingList');
  if(flagged.length===0){ list.innerHTML = `<div class="empty">${t('noFlagged')}</div>`; return; }
  list.innerHTML = `<div class="item-name" style="margin-bottom:10px">${t('needContact')}</div>` + flagged.map(c => `
    <div class="card">
      <div class="row-flex">
        <div>
          <div class="item-name">${c.name}</div>
          <div class="item-meta">${c.phone||'—'} · ${t('lastVisit')} ${daysSince(c.lastVisit)} ${t('days')}</div>
        </div>
        <button class="btn small secondary" onclick="draftMessage('${c.id}')">${t('draft')}</button>
      </div>
      <div class="msg-box" id="msg_${c.id}" style="display:none"></div>
    </div>`).join('');
}

/* ============ INIT ============ */
async function init(){
  currentLang = await loadKey('duliban-lang', 'es');
  tableStatus = await loadKey('duliban-table-status', {});
  tableLayout = await loadKey('duliban-table-layout', null) || defaultLayout();
  orders = await loadKey('duliban-orders', []);
  customers = await loadKey('duliban-customers', []);
  reservations = await loadKey('duliban-reservations', []);
  applyStaticText();
  renderFloor();
  renderOrderCalendar();
  renderOrders();
  renderCalendar();
  renderReservations();
  renderCustomers();
  syncWithLive();
}
init();
</script>
